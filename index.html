<!DOCTYPE html>
<html lang="zh-TW" class="scroll-smooth">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>百思特 APP 智慧物流控制台</title>
  <!-- 導入 Tailwind CSS -->
  <script src="https://cdn.tailwindcss.com"></script>
  <!-- 導入 Lucide 圖示庫 -->
  <script src="https://unpkg.com/lucide@latest"></script>
  <script>
    tailwind.config = {
      darkMode: 'class',
      theme: {
        extend: {
          colors: {
            brand: {
              50: '#f0fdf4', // 偏向健康活力的綠/藍色調
              100: '#dcfce7',
              500: '#10b981',
              600: '#059669',
              700: '#047857',
            }
          },
          boxShadow: {
            'glow-blue': '0 0 15px -3px rgba(59, 130, 246, 0.3)',
            'glow-emerald': '0 0 15px -3px rgba(16, 185, 129, 0.3)',
            'glow-purple': '0 0 15px -3px rgba(168, 85, 247, 0.3)',
            'glow-rose': '0 0 15px -3px rgba(244, 63, 94, 0.3)',
          }
        }
      }
    }
  </script>
  <style>
    .transition-all-300 {
      transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
    }
    /* 網格背景，增加工業科技感 */
    .bg-grid-pattern {
      background-size: 30px 30px;
      background-image: radial-gradient(circle, rgba(148, 163, 184, 0.05) 1px, transparent 1px);
    }
    .dark .bg-grid-pattern {
      background-size: 30px 30px;
      background-image: radial-gradient(circle, rgba(51, 65, 85, 0.15) 1px, transparent 1px);
    }
    /* 卡片懸停發光漸變 */
    .glow-card {
      position: relative;
      overflow: hidden;
    }
    .glow-card::after {
      content: '';
      position: absolute;
      inset: 0;
      background: radial-gradient(circle at var(--mouse-x, 50%) var(--mouse-y, 50%), rgba(255, 255, 255, 0.08) 0%, transparent 50%);
      opacity: 0;
      transition: opacity 0.3s;
      pointer-events: none;
    }
    .glow-card:hover::after {
      opacity: 1;
    }
  </style>
</head>
<body class="bg-slate-50 text-slate-800 dark:bg-slate-950 dark:text-slate-100 min-h-screen flex flex-col bg-grid-pattern transition-colors duration-300">

  <!-- ========================================== -->

  <script>
    // 狀態管理
    let currentCategory = "全部";
    let searchQuery = "";

    // DOM 節點
    const headerAvatar = document.getElementById('header-avatar');
    const headerTitle = document.getElementById('header-title');
    const headerSubtitle = document.getElementById('header-subtitle');
    const mainTitle = document.getElementById('main-title');
    const mainDesc = document.getElementById('main-desc');
    const footerText = document.getElementById('footer-text');
    const categoryFiltersContainer = document.getElementById('category-filters');
    const appsContainer = document.getElementById('apps-container');
    const noResults = document.getElementById('no-results');
    const searchInput = document.getElementById('search-input');
    const themeToggleBtn = document.getElementById('theme-toggle');
    const sunIcon = document.getElementById('sun-icon');
    const moonIcon = document.getElementById('moon-icon');

    // 質感主題色彩配置（支援懸停發光、高光與陰影）
    const colorClasses = {
      blue: {
        border: 'hover:border-blue-500/70 dark:hover:border-blue-500/50 hover:shadow-glow-blue',
        bg: 'bg-blue-50 text-blue-600 dark:bg-blue-950/40 dark:text-blue-400',
        badge: 'bg-blue-50 text-blue-700 dark:bg-blue-950 dark:text-blue-300'
      },
      green: {
        border: 'hover:border-emerald-500/70 dark:hover:border-emerald-500/50 hover:shadow-glow-emerald',
        bg: 'bg-emerald-50 text-emerald-600 dark:bg-emerald-950/40 dark:text-emerald-400',
        badge: 'bg-emerald-50 text-emerald-700 dark:bg-emerald-950 dark:text-emerald-300'
      },
      purple: {
        border: 'hover:border-purple-500/70 dark:hover:border-purple-500/50 hover:shadow-glow-purple',
        bg: 'bg-purple-50 text-purple-600 dark:bg-purple-950/40 dark:text-purple-400',
        badge: 'bg-purple-50 text-purple-700 dark:bg-purple-950 dark:text-purple-300'
      },
      red: {
        border: 'hover:border-rose-500/70 dark:hover:border-rose-500/50 hover:shadow-glow-rose',
        bg: 'bg-rose-50 text-rose-600 dark:bg-rose-950/40 dark:text-rose-400',
        badge: 'bg-rose-50 text-rose-700 dark:bg-rose-950 dark:text-rose-300'
      },
      slate: {
        border: 'hover:border-slate-500/70 dark:hover:border-slate-500/50',
        bg: 'bg-slate-100 text-slate-600 dark:bg-slate-900/50 dark:text-slate-400',
        badge: 'bg-slate-100 text-slate-700 dark:bg-slate-900 dark:text-slate-300'
      }
    };

    // 初始化網頁資訊與統計數據
    function initInfo() {
      headerAvatar.src = CONFIG.profile.avatar;
      headerTitle.textContent = CONFIG.profile.name;
      headerSubtitle.textContent = CONFIG.profile.bio;
      mainTitle.textContent = CONFIG.siteName;
      mainDesc.textContent = CONFIG.siteSubtitle;
      footerText.innerHTML = `© ${new Date().getFullYear()} ${CONFIG.profile.name}. 本控制台由物流資訊部維護與開發。`;

      updateStats();
    }

    // 計算各工作流程 APP 數量並更新看板
    function updateStats() {
      const getCount = (cat) => CONFIG.apps.filter(app => app.category === cat).length;
      document.getElementById('stat-incoming').textContent = `${getCount('進貨')} 個`;
      document.getElementById('stat-outgoing').textContent = `${getCount('出貨')} 個`;
      document.getElementById('stat-returns').textContent = `${getCount('退貨')} 個`;
      document.getElementById('stat-storage').textContent = `${getCount('倉儲') + getCount('系統')} 個`;
    }

    // 初始化深淺色主題
    function initTheme() {
      const savedTheme = localStorage.getItem('theme');
      const prefersDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
      
      if (savedTheme === 'dark' || (!savedTheme && prefersDark)) {
        document.documentElement.classList.add('dark');
        sunIcon.classList.remove('hidden');
        moonIcon.classList.add('hidden');
      } else {
        document.documentElement.classList.remove('dark');
        sunIcon.classList.add('hidden');
        moonIcon.classList.remove('hidden');
      }
    }

    // 主題切換按鈕事件
    themeToggleBtn.addEventListener('click', () => {
      const isDark = document.documentElement.classList.contains('dark');
      if (isDark) {
        document.documentElement.classList.remove('dark');
        localStorage.setItem('theme', 'light');
        sunIcon.classList.add('hidden');
        moonIcon.classList.remove('hidden');
      } else {
        document.documentElement.classList.add('dark');
        localStorage.setItem('theme', 'dark');
        sunIcon.classList.remove('hidden');
        moonIcon.classList.add('hidden');
      }
    });

    // 重設篩選按鈕
    function resetFilters() {
      searchInput.value = '';
      searchQuery = '';
      currentCategory = '全部';
      renderCategories();
      renderApps();
    }

    // 渲染分類篩選按鈕
    function renderCategories() {
      categoryFiltersContainer.innerHTML = '';
      CONFIG.categories.forEach(category => {
        const button = document.createElement('button');
        button.textContent = category;
        button.className = 'px-4 py-2 text-xs md:text-sm font-semibold rounded-2xl transition-all-300 ';
        
        if (category === currentCategory) {
          button.className += 'bg-emerald-500 text-white shadow-md shadow-emerald-500/20 border border-emerald-500';
        } else {
          button.className += 'bg-slate-50 dark:bg-slate-900/60 text-slate-600 dark:text-slate-400 hover:bg-slate-100 dark:hover:bg-slate-800 border border-slate-200 dark:border-slate-800/80';
        }

        button.addEventListener('click', () => {
          currentCategory = category;
          renderCategories();
          renderApps();
        });

        categoryFiltersContainer.appendChild(button);
      });
    }

    // 輔助函式：讓搜尋字詞在標題中亮黃色高亮顯示
    function highlightText(text, query) {
      if (!query) return text;
      const regex = new RegExp(`(${query})`, 'gi');
      return text.replace(regex, `<mark class="bg-amber-100 text-slate-900 dark:bg-amber-400/80 dark:text-slate-950 px-0.5 rounded">$1</mark>`);
    }

    // 產生一個 App 卡片 HTML
    function createAppCard(app) {
      const colorConfig = colorClasses[app.color] || colorClasses.blue;
      const titleText = highlightText(app.title, searchQuery);
      const descText = highlightText(app.description, searchQuery);
      
      return `
        <a href="${app.url}" target="${app.url.startsWith('http') ? '_blank' : '_self'}"
           class="group glow-card flex flex-col justify-between p-5 bg-white dark:bg-slate-900 rounded-2xl border border-slate-200/70 dark:border-slate-800/80 shadow-sm hover:shadow-md transition-all-300 hover:-translate-y-1 ${colorConfig.border}"
           onmousemove="handleCardGlow(event, this)">
          <div>
            <div class="flex items-start justify-between mb-3.5">
              <!-- 圖示邊框與背景 -->
              <div class="p-3 rounded-xl ${colorConfig.bg} transition-colors border border-slate-100/50 dark:border-slate-800/50">
                <i data-lucide="${app.icon || 'globe'}" class="w-5.5 h-5.5"></i>
              </div>
              <!-- 功能分類微標籤 -->
              <span class="text-[10px] px-2 py-0.5 rounded-full font-bold uppercase tracking-wider ${colorConfig.badge}">
                ${app.category}
              </span>
            </div>
            <!-- 標題與簡介 -->
            <h3 class="text-base font-bold text-slate-800 dark:text-slate-100 group-hover:text-emerald-500 dark:group-hover:text-emerald-400 transition-colors flex items-center gap-1.5">
              ${titleText}
              <i data-lucide="arrow-up-right" class="w-4 h-4 opacity-0 group-hover:opacity-100 group-hover:translate-x-0.5 group-hover:-translate-y-0.5 transition-all-300"></i>
            </h3>
            <p class="text-xs text-slate-500 dark:text-slate-400 mt-2 line-clamp-3 leading-relaxed">
              ${descText}
            </p>
          </div>
          <!-- 底部快速指引 -->
          <div class="mt-5 pt-3 border-t border-slate-100 dark:border-slate-800/80 flex items-center justify-between text-xs font-semibold text-slate-400 group-hover:text-emerald-500 transition-colors">
            <span class="text-[10px] text-slate-400 dark:text-slate-500">
              ${app.url.startsWith('http') ? '開展新分頁' : '內部應用'}
            </span>
            <div class="flex items-center gap-0.5 text-emerald-500 dark:text-emerald-400 opacity-0 group-hover:opacity-100 transition-all-300">
              <span>立即啟動</span>
              <i data-lucide="chevron-right" class="w-3.5 h-3.5"></i>
            </div>
          </div>
        </a>
      `;
    }

    // 動態卡片隨滑鼠移動產生高光特效
    function handleCardGlow(e, card) {
      const rect = card.getBoundingClientRect();
      const x = e.clientX - rect.left;
      const y = e.clientY - rect.top;
      card.style.setProperty('--mouse-x', `${x}px`);
      card.style.setProperty('--mouse-y', `${y}px`);
    }

    // 渲染 App 清單 (核心重寫：支援分區和單一 grid)
    function renderApps() {
      appsContainer.innerHTML = '';
      
      // 先對 APP 進行過濾
      const filteredApps = CONFIG.apps.filter(app => {
        const matchesCategory = currentCategory === "全部" || app.category === currentCategory;
        const matchesSearch = app.title.toLowerCase().includes(searchQuery.toLowerCase()) || 
                              app.description.toLowerCase().includes(searchQuery.toLowerCase());
        return matchesCategory && matchesSearch;
      });

      // 是否無任何匹配結果
      if (filteredApps.length === 0) {
        appsContainer.classList.add('hidden');
        noResults.classList.remove('hidden');
        return;
      } else {
        appsContainer.classList.remove('hidden');
        noResults.classList.add('hidden');
      }

      // 如果選擇「全部」且沒有搜尋字，則採用「工作流程（進/出/退/倉儲）大分區」進行排版！
      if (currentCategory === "全部" && searchQuery === "") {
        const categoriesInFlow = ["進貨", "出貨", "退貨", "倉儲", "系統"];
        
        categoriesInFlow.forEach(flowName => {
          const flowApps = filteredApps.filter(app => app.category === flowName);
          
          // 如果該工作流底下目前沒有 app，則不顯示該區塊
          if (flowApps.length === 0) return;
          
          const flowSetting = CONFIG.flowSettings[flowName] || CONFIG.flowSettings["系統"];
          
          const flowSection = document.createElement('section');
          flowSection.className = `p-6 md:p-8 rounded-3xl bg-gradient-to-b ${flowSetting.bg} border ${flowSetting.border} shadow-sm space-y-6`;
          
          flowSection.innerHTML = `
            <div class="flex flex-col md:flex-row md:items-center justify-between gap-2 pb-4 border-b border-slate-200/50 dark:border-slate-800/80">
              <div>
                <h3 class="text-lg md:text-xl font-bold text-slate-800 dark:text-slate-100 flex items-center gap-2">
                  ${flowSetting.title}
                </h3>
                <p class="text-xs text-slate-500 dark:text-slate-400 mt-1">${flowSetting.desc}</p>
              </div>
              <span class="inline-flex self-start md:self-center items-center px-3 py-1 text-xs font-semibold rounded-full bg-white dark:bg-slate-900 border border-slate-200 dark:border-slate-800 shadow-sm text-slate-500">
                ${flowApps.length} 個應用
              </span>
            </div>
            
            <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">
              ${flowApps.map(app => createAppCard(app)).join('')}
            </div>
          `;
          appsContainer.appendChild(flowSection);
        });
      } else {
        // 如果是特定分類，或有輸入搜尋關鍵字，則顯示一般精簡 Grid 視圖，方便快速尋找
        const gridContainer = document.createElement('div');
        gridContainer.className = 'grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6 pt-2';
        gridContainer.innerHTML = filteredApps.map(app => createAppCard(app)).join('');
        
        // 如果是特定分類，多一個分區大標頭
        if (currentCategory !== "全部") {
          const flowSetting = CONFIG.flowSettings[currentCategory] || CONFIG.flowSettings["系統"];
          const flowHeader = document.createElement('div');
          flowHeader.className = 'mb-6 pb-4 border-b border-slate-200 dark:border-slate-800';
          flowHeader.innerHTML = `
            <h3 class="text-xl font-bold text-slate-800 dark:text-slate-100">${flowSetting ? flowSetting.title : currentCategory}</h3>
            <p class="text-xs text-slate-500 dark:text-slate-400 mt-1">${flowSetting ? flowSetting.desc : ''}</p>
          `;
          appsContainer.appendChild(flowHeader);
        }
        
        appsContainer.appendChild(gridContainer);
      }

      // 重新渲染 Lucide 圖示
      lucide.createIcons();
    }

    // 搜尋輸入框監聽
    searchInput.addEventListener('input', (e) => {
      searchQuery = e.target.value;
      renderApps();
    });

    // 視窗載入完成初始化
    window.onload = function () {
      initTheme();
      initInfo();
      renderCategories();
      renderApps();
      lucide.createIcons();
    };
  </script>
</body>
</html>
